services:
  backend:
    build: ./backend
    container_name: editorai-backend
    command: >
      sh -c "chown -R www-data:www-data /var/www/storage /var/www/database &&
             chmod -R 775 /var/www/storage /var/www/database &&
             php artisan migrate --force &&
             php artisan storage:link 2>/dev/null;
             php artisan serve --host=0.0.0.0 --port=8000"
    volumes:
      - backend-storage:/var/www/storage
      - backend-db:/var/www/database
    env_file:
      - ./backend/.env
    networks:
      - editorai

  frontend:
    build: ./frontend
    container_name: editorai-frontend
    ports:
      - "2994:80"
    depends_on:
      - backend
    networks:
      - editorai

volumes:
  backend-storage:
  backend-db:


networks:
  editorai:
    driver: bridge
